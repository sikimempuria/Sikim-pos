name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  checks:
    name: Node 20 checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: POS UI shell contract test
        run: |
          test -f scripts/pos-ui-shell-contract.test.mjs
          node scripts/pos-ui-shell-contract.test.mjs

      - name: POS password gate contract test
        run: |
          test -f scripts/pos-password-gate-contract.test.mjs
          node scripts/pos-password-gate-contract.test.mjs

      - name: Build
        run: npm run build
